{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="hero">

  <video class="hero-video" autoplay muted loop playsinline>
    <source src="{% static 'img/home-video-bg.mp4' %}" type="video/mp4">
  </video>

  <div class="hero-overlay"></div>

  <div class="hero-container">

    <div class="hero-text">
      <img
        src="{% static 'img/logo-big.png' %}"
        class="logo-hero"
        alt="Science Box"
      >

      <h1>
        Tecnologia que ensina <br>
        Ciência que conecta
      </h1>

      <p>
        Kits tecnológicos para aprendizado prático em ciência e inovação.
      </p>

      <a href="/kits/" class="btn-science-cta">
        Nossos Produtos;
      </a>
    </div>

    <div class="hero-image">
      <img
        src="{% static 'img/img-home.png' %}"
        alt="Placa Science Box"
      >
    </div>

  </div>

</section>

{% endblock %}
