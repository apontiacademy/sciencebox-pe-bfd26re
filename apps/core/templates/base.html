{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScienceBox</title>

  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="{% block body_class %}{% endblock %}">

  <nav class="side-nav">

    <div class="side-logo">
      <img src="{% static 'img/logo-small.png' %}" class="logo-sidebar-fix" alt="ScienceBox">
    </div>

    <ul>

      <li>
        <a href="/" class="{% if request.path == '/' %}active{% endif %}">
          <span class="menu-number">01</span>
          <i class="menu-dot"></i>
          <span class="menu-text">Home</span>
        </a>
      </li>

      <li>
        <a href="/sobre/" class="{% if '/sobre' in request.path %}active{% endif %}">
          <span class="menu-number">02</span>
          <i class="menu-dot"></i>
          <span class="menu-text">Sobre Nós</span>
        </a>
      </li>

      <li>
        <a href="/kits/" class="{% if '/kits' in request.path %}active{% endif %}">
          <span class="menu-number">03</span>
          <i class="menu-dot"></i>
          <span class="menu-text">Produtos</span>
        </a>
      </li>

      <li>
        <a href="/softwares/" class="{% if '/softwares' in request.path %}active{% endif %}">
          <span class="menu-number">04</span>
          <i class="menu-dot"></i>
          <span class="menu-text">Softwares</span>
        </a>
      </li>

      <li>
        <a href="/contato/" class="{% if '/contato' in request.path %}active{% endif %}">
          <span class="menu-number">05</span>
          <i class="menu-dot"></i>
          <span class="menu-text">Contato</span>
        </a>
      </li>

    </ul>

  </nav>

  <main class="site-main">
    {% block content %}
    {% endblock %}
  </main>

<script>

document.addEventListener('DOMContentLoaded', () => {

    const slides = document.querySelectorAll('.slide');

    const leftBtn = document.querySelector('.arrow.left');
    const rightBtn = document.querySelector('.arrow.right');

    if(!slides.length || !leftBtn || !rightBtn){
        return;
    }

    let current = 0;

    function updateCoverflow(){

        slides.forEach(slide => {
            slide.classList.remove(
                'active',
                'left',
                'right',
                'hidden'
            );
        });

        slides[current].classList.add('active');

        const prev =
            (current - 1 + slides.length)
            % slides.length;

        const next =
            (current + 1)
            % slides.length;

        slides[prev].classList.add('left');
        slides[next].classList.add('right');

        slides.forEach((slide,index)=>{

            if(
                index !== current &&
                index !== prev &&
                index !== next
            ){
                slide.classList.add('hidden');
            }

        });

    }

    rightBtn.addEventListener('click', () => {

        current++;

        if(current >= slides.length){
            current = 0;
        }

        updateCoverflow();

    });

    leftBtn.addEventListener('click', () => {

        current--;

        if(current < 0){
            current = slides.length - 1;
        }

        updateCoverflow();

    });

    updateCoverflow();

});

</script>

</body>
</html>
